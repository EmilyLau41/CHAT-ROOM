<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Chat | 雙重登入版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #128c7e;
            --primary-dark: #075e54;
            --bg-chat: #efeae2;
            --msg-mine: #dcf8c6;
            --msg-other: #ffffff;
        }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; background: #d1d7db; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* 登入介面樣式 */
        #auth-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #075e54, #128c7e); }
        .auth-card { background: white; padding: 30px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .auth-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-row { display: flex; gap: 10px; }
        
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .btn-magic { background: #34b7f1; color: white; width: 100%; }
        .btn-login { background: var(--primary); color: white; flex: 1; }
        .btn-signup { background: #555; color: white; flex: 1; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* 聊天介面樣式 */
        #main-chat { display: none; width: 100%; height: 100vh; flex-direction: column; background: white; }
        .header { background: #ededed; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-chat); display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 75%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.mine { align-self: flex-end; background: var(--msg-mine); }
        .msg.other { align-self: flex-start; background: var(--msg-other); }
        
        .input-area { background: #f0f2f5; padding: 10px; display: flex; gap: 10px; }
        #msg-input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card">
        <h2 style="color:var(--primary-dark)">聊天室登入</h2>
        <input type="email" id="email-input" placeholder="電子郵件">
        <input type="password" id="password-input" placeholder="密碼 (註冊或密碼登入用)">
        
        <div class="btn-stack">
            <button id="magic-btn" class="btn-magic">傳送魔術連結 (免密碼)</button>
            <div class="btn-row">
                <button id="login-btn" class="btn-login">密碼登入</button>
                <button id="signup-btn" class="btn-signup">註冊帳號</button>
            </div>
        </div>
        <p id="auth-msg" style="font-size: 13px; margin-top: 15px; color: #d66100; min-height: 1.5em;"></p>
    </div>
</div>

<div id="main-chat">
    <div class="header">
        <span id="user-display">使用者</span>
        <button onclick="handleLogout()" style="cursor:pointer; background:none; border:1px solid #888; border-radius:4px; padding:2px 8px;">登出</button>
    </div>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="輸入訊息...">
        <button id="send-btn" style="background:var(--primary); color:white; border-radius:50%; width:40px; height:40px;">➤</button>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // 1. 初始化 Supabase
    const SUPABASE_URL = 'https://dhypkutxhcfjpzmlufxr.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1k3-mNqoqErdRgxC0P11zA_fXVopcwJ';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. 獲取 UI 元素
    const emailInput = document.getElementById('email-input');
    const passwordInput = document.getElementById('password-input');
    const authMsg = document.getElementById('auth-msg');
    
    // 按鈕
    const magicBtn = document.getElementById('magic-btn');
    const loginBtn = document.getElementById('login-btn');
    const signupBtn = document.getElementById('signup-btn');
    const sendBtn = document.getElementById('send-btn');
    
    // 容器
    const authContainer = document.getElementById('auth-container');
    const mainChat = document.getElementById('main-chat');
    const userDisplay = document.getElementById('user-display');
    const chatWindow = document.getElementById('chat-window');
    const msgInput = document.getElementById('msg-input');

    let currentUserEmail = "";

    // --- A. 註冊功能 ---
    signupBtn.onclick = async () => {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        
        if (!email || !password) return alert("註冊請填寫帳號與密碼");
        if (password.length < 6) return alert("密碼至少需要 6 位");

        signupBtn.disabled = true;
        authMsg.innerText = "正在處理註冊...";

        const { data, error } = await _supabase.auth.signUp({
            email: email,
            password: password
        });

        if (error) {
            authMsg.innerText = "❌ 註冊失敗: " + error.message;
            signupBtn.disabled = false;
        } else {
            authMsg.innerText = "✅ 註冊成功！現在請點擊「密碼登入」。";
            signupBtn.disabled = false;
        }
    };

    // --- B. 密碼登入 ---
    loginBtn.onclick = async () => {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        
        if (!email || !password) return alert("請輸入帳號與密碼");

        loginBtn.disabled = true;
        authMsg.innerText = "正在登入...";

        const { error } = await _supabase.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) {
            authMsg.innerText = "❌ 登入失敗: " + error.message;
            loginBtn.disabled = false;
        }
    };

    // --- C. 魔術連結 ---
    magicBtn.onclick = async () => {
        const email = emailInput.value.trim();
        if (!email) return alert("請輸入 Email");

        magicBtn.disabled = true;
        authMsg.innerText = "正在發送魔術連結...";

        const { error } = await _supabase.auth.signInWithOtp({
            email: email,
            options: { emailRedirectTo: window.location.href }
        });

        if (error) {
            authMsg.innerText = "❌ 錯誤: " + error.message;
            magicBtn.disabled = false;
        } else {
            authMsg.innerText = "✅ 連結已發送，請檢查信箱。";
        }
    };

    // 監聽身份狀態變更
    _supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
            currentUserEmail = session.user.email;
            userDisplay.innerText = `👤 ${currentUserEmail}`;
            authContainer.style.display = 'none';
            mainChat.style.display = 'flex';
            loadHistory();
            subscribe();
        } else {
            authContainer.style.display = 'flex';
            mainChat.style.display = 'none';
        }
    });

    // 聊天邏輯
    async function handleSend() {
        const content = msgInput.value.trim();
        if (!content) return;
        await _supabase.from('messages').insert([{ sender: currentUserEmail, content }]);
        msgInput.value = '';
    }

    sendBtn.onclick = handleSend;
    msgInput.onkeydown = (e) => { if (e.key === 'Enter') handleSend(); };

    async function loadHistory() {
        const { data } = await _supabase.from('messages').select('*').order('created_at', { ascending: true });
        chatWindow.innerHTML = '';
        if (data) data.forEach(msg => render(msg));
    }

    function render(msg) {
        const div = document.createElement('div');
        div.className = `msg ${msg.sender === currentUserEmail ? 'mine' : 'other'}`;
        div.innerHTML = `<small style="display:block; font-size:10px; color:#888;">${msg.sender.split('@')[0]}</small>${msg.content}`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function subscribe() {
        _supabase.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => render(p.new)).subscribe();
    }

    window.handleLogout = () => _supabase.auth.signOut();
});
</script>
</body>
</html>
